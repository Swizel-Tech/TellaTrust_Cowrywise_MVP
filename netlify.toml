# Netlify config for TellaTrust.
#
# ONE Netlify site serves both apps from this monorepo:
#   /        -> customer PWA   (apps/web)
#   /admin   -> admin console  (apps/admin)
#
# The build runs from the REPO ROOT (no `base`) so npm workspaces resolve
# (@tellavault/shared). We build both apps, then copy the admin's dist into
# apps/web/dist/admin so the single publish folder contains both.

[build]
  command = "npm install && npm run build:web && npm run build:admin && rm -rf apps/web/dist/admin && mkdir -p apps/web/dist/admin && cp -r apps/admin/dist/. apps/web/dist/admin/"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback for the admin (must come BEFORE the catch-all below).
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# SPA fallback for the customer app.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
